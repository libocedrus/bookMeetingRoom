name: Update Pages Data

on:
  push:
    branches:
      - main
  schedule:
    - cron: "1 16 * * *"
    - cron: "11 16 * * *"
    - cron: "31 16 * * *"
    - cron: "1 17 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Restore previous data
        uses: actions/cache@v4
        with:
          path: github-pages/public/data
          key: reminder-data-${{ github.run_id }}
          restore-keys: |
            reminder-data-

      - name: Generate reminder data
        run: node github-pages/scripts/generate-data.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: github-pages/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
